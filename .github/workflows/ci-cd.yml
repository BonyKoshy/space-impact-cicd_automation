name: 🚀 Space Impact CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ============================
  # 🧪 CI PHASE (LINT & CHECK)
  # ============================
  ci:
    name: 🧪 CI - Code Validation
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🔍 Run ESLint
        run: npm run lint:js

      - name: ✅ Check HTML
        run: npm run lint:html

      - name: 🎨 Check CSS
        run: npm run lint:css

  # ============================
  # 🧪 TEST PHASE
  # ============================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🧪 Run Vitest
        run: npm run test

  # ============================
  # 📦 BUILD PHASE
  # ============================
  build:
    name: 📦 Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Prepare Build
        run: |
          npm install
          npm run build

      - name: 📤 Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: space-impact-build
          path: dist

  # ============================
  # 🏷️ RELEASE PHASE
  # ============================
  release:
    name: 🏷️ Semantic Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write 
      issues: write 
      pull-requests: write 

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🏷️ Run Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================
  # 🚀 CD PHASE (DEPLOY)
  # ============================
  deploy:
    name: 🚀 Deploy Application
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: 📥 Download Build
        uses: actions/download-artifact@v4
        with:
          name: space-impact-build
          path: dist

      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 🚀 Deploy
        id: deploy
        uses: actions/deploy-pages@v4

      - name: 🌐 Show Live URL
        run: |
          echo "🎉 Deployment Successful!"
          echo "🌍 Website URL:"
          echo "${{ steps.deploy.outputs.page_url }}"
